# ETH3D benchmark configuration
# Inherits shared benchmark settings from benchmark_base.yaml

_base_: "benchmark_base.yaml"

# Dataset paths
# Use {dataset} as a placeholder for the dataset name (e.g., courtyard, facade, etc.)
images_pattern: "../datasets/ETH3D/mvs/multi_view_training_dslr_undistorted/{dataset}/images_resized/"
gt_pattern: "../datasets/ETH3D/mvs/multi_view_training_dslr_undistorted/{dataset}/reconstruction_gt/"
output_pattern: "results/{dataset}"

# Optionally override pipeline options for this benchmark
intrinsics_mode: SHARED
# num_neighbors: 50
force_load: true

# Benchmark options
benchmark:
  # Set to null to run all datasets, or specify a list to run only those
  # datasets: ["courtyard", "facade", "delivery_area"]
  # datasets: ["meadow"]
  datasets: ["courtyard"]
  # datasets: ["facade", "kicker", "meadow", "office", "playground", "relief", "relief_2", "terrace", "terrains"]
  # datasets: null
  # continue_on_error: true


# Evaluation settings for pose comparison
evaluation:
  # Thresholds for pose accuracy computation (in degrees)
  pose_thresholds: [1, 3, 5, 30]
