[workspace]
preview = ["pixi-build"]
channels = ["conda-forge"]
name = "gluemap"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda   = "12"

[dependencies]
python = "3.11.*"
pytorch-gpu = ">=2.10.0,<3"
torchvision = ">=0.26.0,<0.27"
compilers = ">=1.11.0,<2"
cxx-compiler = ">=1.11.0,<2"
cmake = ">=4.2.0,<5"
ninja = ">=1.13.0,<2"
git = ">=2.52.0,<3"
wget = ">=1.21.4,<2"
libcudss = ">=0.7.1.4,<0.8"
metis = "5.1.0.*"
eigen = ">=5.0.1,<6"
cuda-nvcc = "12.9.*"
libcudss-dev = ">=0.7.1.4,<0.8"
libcublas-dev = ">=12.9.2.10,<13"
libcusolver-dev = ">=11.7.5.82,<12"
libcusparse-dev = ">=12.5.10.65,<13"
pip = ">=26.1.1,<27"
suitesparse = ">=7.10.1,<8"
glog = ">=0.7.1,<0.8"
curl = ">=8.20.0,<9"
libboost = ">=1.91.0,<2"
libboost-devel = ">=1.91.0,<2"
glew = ">=2.3.0,<3"
libgl = ">=1.7.0,<2"
libgl-devel = ">=1.7.0,<2"
libcurand = ">=10.3.10.19,<11"
libcurand-dev = ">=10.3.10.19,<11"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
scipy = "==1.17.1"
h5py = "==3.16.0"
networkx = "==3.6.1"
pillow = "==12.2.0"
tqdm = "==4.67.3"
einops = "==0.8.2"
imagesize = "==2.0.0"
safetensors = "==0.7.0"
pyyaml = "==6.0.3"
faiss-cpu = "==1.13.2"
hydra-core = "==1.3.2"
omegaconf = "==2.3.0"
huggingface-hub = "==1.12.0"
plyfile = "==1.1.3"
scikit-learn = "==1.8.0"
uniception = "==0.1.7"
pytorch-lightning = "==2.6.1"
pytorch-metric-learning = "==2.9.0"
lightglue = { git = "https://github.com/cvg/LightGlue.git", rev = "eb42fee2d71449efb0aa5c10549752b5d75384d8" }
opencv-python = ">=4.13.0.92, <5"
click = ">=8.4.1, <9"

[activation]
# Otherwise we will get following error (it might be worth to trace and fix upstream where this dependency got lost):
# ImportError: libmkl_intel_thread.so.3: undefined symbol: __atomic_compare_exchange
env = { LD_PRELOAD = "$CONDA_PREFIX/lib/libatomic.so" }

[tasks]
fetch-thirdparties = "git submodule update --init --recursive"
patch-ceres-cuda-arch = {cmd = "python scripts/patch_ceres_cuda_arch.py", depends-on = ["fetch-thirdparties"]}
patch-colmap-system-openimageio = {cmd = "python scripts/patch_colmap_system_openimageio.py", depends-on = ["fetch-thirdparties"]}

configure-ceres-solver = {cwd = "thirdparty/ceres-solver", cmd = "../../scripts/configure_cuda_project.sh . build -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DBUILD_EXAMPLES=OFF -DBUILD_BENCHMARKS=OFF -DBUILD_TESTING=OFF", depends-on = ["patch-ceres-cuda-arch"]}
build-ceres-solver = { cwd = "thirdparty/ceres-solver", cmd = "cmake --build build", depends-on = ["configure-ceres-solver"]}
install-ceres-solver = {cwd = "thirdparty/ceres-solver", cmd = "cmake --install build", depends-on = ["build-ceres-solver"]}
install-pyceres = {cwd = "thirdparty/pyceres", cmd = "pip3 install -e .", depends-on = ["install-ceres-solver"]}

configure-colmap = {cwd = "thirdparty/colmap", cmd = "../../scripts/configure_cuda_project.sh . build -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX -DGUI_ENABLED=OFF -DOPENGL_ENABLED=OFF -DCGAL_ENABLED=OFF -DLSD_ENABLED=OFF", depends-on = ["install-pyceres", "patch-colmap-system-openimageio"]}
build-colmap = { cwd = "thirdparty/colmap", cmd = "cmake --build build", depends-on = ["configure-colmap"]}
install-colmap = {cwd = "thirdparty/colmap", cmd = "cmake --install build", depends-on = ["build-colmap"]}
install-pycolmap = {cwd = "thirdparty/colmap", cmd = "../../scripts/install_pycolmap.sh", depends-on = ["install-colmap"]}

fix-mast3r-for-new-pytorch = {cmd = "sed -i -e \"s/model_path, map_location='cpu'/model_path, map_location='cpu', weights_only=False/g\" thirdparty/doppelgangers-plusplus/mast3r/model.py", depends-on = ["fetch-thirdparties"]}
install-gluemap = {cmd = "pip3 install --no-deps -e .", depends-on = ["fix-mast3r-for-new-pytorch", "install-pycolmap"]}
check-gluemap = {cmd = "python -c \"import gluemap, pycolmap, pygluemap, torch; print('pycolmap', pycolmap.__version__); print('pygluemap', pygluemap.__file__); print('torch_cuda', torch.cuda.is_available())\""}
print-cuda-arch = {cmd = "python -c \"import os; print(os.environ.get('GLUEMAP_CUDA_ARCH', '89'))\""}
download-checkpoints-minimal = {cmd = "bash scripts/download_checkpoints.sh minimal"}
download-checkpoints-full = {cmd = "bash scripts/download_checkpoints.sh full"}
make-tomato-smoke-subset = {cmd = "python scripts/make_image_subset.py --mode symlink --clear"}
gluemap-tomato-smoke = {cmd = "gluemap-demo --config configs/tomato_l4_smoke.yaml --rerun_from retrieval", depends-on = ["install-gluemap", "download-checkpoints-minimal", "make-tomato-smoke-subset"]}
